<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset App Cache — Anahuac RV Park</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 2rem auto; padding: 1rem; text-align: center; color: #1c1917; }
  h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  p { font-size: 0.9rem; color: #57534e; line-height: 1.5; }
  button { background: #dc2626; color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
  button:active { background: #b91c1c; }
  #status { margin-top: 1.5rem; font-size: 0.9rem; font-weight: 600; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
</style>
</head>
<body>
  <h1>Reset App Cache</h1>
  <p>If the app is showing a blank page, frozen, or behaving strangely, this will clear all cached data and reload fresh from the server.</p>
  <p style="font-size:0.8rem;color:#a8a29e">This does NOT delete your account, messages, or payment history. It only clears the browser cache.</p>
  <button onclick="resetAll()">Reset App Cache</button>
  <div id="status"></div>
<script>
async function resetAll() {
  var el = document.getElementById('status');
  el.textContent = 'Clearing...';
  try {
    // 1. Unregister ALL service workers
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r) { return r.unregister(); }));
    }
    // 2. Delete ALL caches
    if ('caches' in window) {
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }
    // 3. Clear storage
    try { sessionStorage.clear(); } catch(e) {}
    try { localStorage.removeItem('portal_token'); localStorage.removeItem('portal_tenant'); } catch(e) {}
    el.className = 'ok';
    el.textContent = 'Cache cleared! Reloading in 2 seconds...';
    setTimeout(function() { window.location.href = '/portal.html?_=' + Date.now(); }, 2000);
  } catch (e) {
    el.className = 'err';
    el.textContent = 'Error: ' + e.message + '. Try closing all tabs and reopening.';
  }
}
</script>
</body>
</html>
