<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anahuac RV Park Management</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-container">
      <div class="login-box">
        <h1>Anahuac RV Park</h1>
        <p class="login-subtitle">Management System</p>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          <p id="login-error" class="error-text" style="display:none"></p>
        </form>
        <p class="login-footer">1003 Davis Ave, Anahuac, TX 77514 | 409-267-6603</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none">
      <nav id="sidebar">
        <div class="sidebar-header">
          <h2>Anahuac RV Park</h2>
          <button id="menu-toggle" class="menu-btn">&#9776;</button>
        </div>
        <ul class="nav-menu">
          <li><a href="#" data-page="dashboard" class="nav-link active">&#127968; Dashboard</a></li>
          <li><a href="#" data-page="sitemap" class="nav-link">&#128506; Site Map</a></li>
          <li><a href="#" data-page="tenants" class="nav-link">&#128101; Tenants</a></li>
          <li><a href="#" data-page="meters" class="nav-link">&#9889; Meter Readings</a></li>
          <li><a href="#" data-page="billing" class="nav-link">&#128176; Billing & Invoices</a></li>
          <li><a href="#" data-page="payments" class="nav-link">&#128179; Payments</a></li>
          <li><a href="#" data-page="checkins" class="nav-link">&#128203; Check-In/Out</a></li>
          <li><a href="#" data-page="messages" class="nav-link">&#128233; Messaging</a></li>
          <li><a href="#" data-page="waitlist" class="nav-link">&#128221; Waitlist</a></li>
        </ul>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn btn-outline btn-full">Logout</button>
        </div>
      </nav>
      <main id="content">
        <div id="page-content"></div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/sitemap.js"></script>
  <script src="/js/pages/tenants.js"></script>
  <script src="/js/pages/meters.js"></script>
  <script src="/js/pages/billing.js"></script>
  <script src="/js/pages/payments.js"></script>
  <script src="/js/pages/checkins.js"></script>
  <script src="/js/pages/messages.js"></script>
  <script src="/js/pages/waitlist.js"></script>
</body>
</html>
